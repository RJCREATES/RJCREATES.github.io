<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RJ CREATES</title>
    <style>
        :root {
            --bg-color: #FDFBF7;
            --text-color: #2D1B14; /* Rich Brown */
            --accent-color: #8B4513; /* Saddle Brown */
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; text-align: center; }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { font-weight: 300; margin-bottom: 30px; }

        /* Two-Column Layout for YouTube */
        .channel-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .channel-btn { flex: 1; padding: 15px; border: 2px solid var(--text-color); border-radius: 8px; text-decoration: none; color: var(--text-color); font-weight: bold; }
        .channel-btn:hover { background-color: var(--text-color); color: white; }

        /* Other buttons */
        .btn { display: block; background-color: var(--text-color); color: white; padding: 15px; margin: 10px 0; text-decoration: none; border-radius: 8px; }
        .btn-secondary { background-color: transparent; border: 2px solid var(--text-color); color: var(--text-color); }
        .btn:hover { background-color: var(--accent-color); border-color: var(--accent-color); color: white; }
    </style>
</head>
<body>

<div class="container">

    <h1>RJ CREATES</h1>
    <p>Content Creator | Mobile Gamer | Editor</p>

    <!-- Two YouTube Tabs -->
    <div class="channel-grid">
        <a href="https://youtube.com/@realrjplays" class="channel-btn">RJ PLAYS (YouTube)</a>
        <a href="https://youtube.com/@RJEDITZZZ" class="channel-btn">RJ EDITZZZ (YouTube)</a>
    </div>

    <!-- Other Links -->
    <a href="https://www.instagram.com/realrjplaysyt?igsh=MThzdHppZ3RibXB3aA==" class="btn">RJ PLAYS (Instagram)</a>
    <a href="https://discord.gg/jSSKFNknZS" class="btn">RJ’s HQ (Discord)</a>
    <a href="Creation.html" class="btn">Other Creations</a>
</div>

<h3 style="margin-top: 40px;">Videos</h3>
<div class="video-container">
    <!-- Use the /embed/ link format! -->
    <iframe width="100%" height="200" src="https://www.youtube.com/embed/psHWVuHtXnk" frameborder="0" allowfullscreen></iframe>
    <iframe width="100%" height="200" src="https://www.youtube.com/embed/JLEqELc..." frameborder="0" allowfullscreen></iframe>
</div>



</body>
</html>
